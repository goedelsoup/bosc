bosc_google_timeline:
  - {date: 2023-05-18, page: 3, event: "Project BOSC first appears -- prospect wants 400-600 ac in 'American Industrial Park'. Options: Neff 202.57 ac, Miller 55 ac, Brenneman 81 ac. Realtor Larry Vandemark (Oakridge)."}
  - {date: 2024-02-22, page: 6, event: "Buyer agreements received; Miller + Brenneman agree to sign rezoning petition. Phil Buell authorized to execute option + right-of-entry (pending Huffman review)."}
  - {date: 2024-03-21, page: 9, event: "4 landowners / 351 ac. Jill Tangeman (Vorys) named owners' representative for rezoning. 40-ac Sugar Creek parcel excluded."}
  - {date: 2024-04-18, page: 13, event: "Soil borings; 'when the rezoning petition is submitted, the use of the site will be disclosed but not the name of the company.' Working with Elida School + 'Yes4Elida' committee."}
  - {date: 2024-08-22, page: 28, event: "Working with Tetra Tech (recommended by Todd Audet) for access layouts SR65/SR115/N. Cole; $5,000 budget."}
  - {date: 2024-10-24, page: 32, event: "Conditional Use Permit process for Neff property begins (Leis, Huffman, Tangeman + zoning inspector). Gracelys withdrew; access refocused to main N. Cole point."}
  - {date: 2025-02-27, page: 35, event: "Prospect requests a CRA: 75% / 15-yr abatement; 'additional compensation agreement in the amount of $200,000 per year' to Elida; delayed past the May Elida levy. Neighbors PSA $600,000 (appraised $300K)."}
  - {date: 2025-03-27, page: 39, event: "CRA application to ODOD 2025-04-17; Vorys drafted CRA for prosecutor Williamowski + BOCC; School District PILOT $250,000/yr proposed (Elida board 2025-05-20). Water/sanitary/TIS underway."}
  - {date: 2025-05-29, page: 45, event: "Approved Tetra Tech proposal for N. Cole Street conceptual layouts, $16,000."}
  - {date: 2025-06-26, page: 47, event: "Motion authorizing PAAC Chair to execute the Roadwork Cooperative Agreement w/ BOSC. CRA language approved by BOCC 6/24; school notice 6/25; final CRA on/after 7/10. Options-to-BOSC assignment deferred to a Special Meeting."}
  - {date: 2025-07-02, page: 50, event: "(Special) Public comment: Trisha Gross + Heather Davis ask when public will learn if data center is 'storage or cloud services' + for transparency; Buell deflects. Approved Assignment of Options to Bistrozzi LLC: Brenneman Brothers, Neff Farms Inc, Pike Run Farms."}
  - {date: 2025-07-29, page: 52, event: "Approved the Roadwork Development Agreement w/ Bistrozzi LLC (Res O.729-25). ~$14.5M into a PAAC account; $2.5M earmarked Bluelick/Cole roundabout; ROW included; roads dedicated to County. Guests: Brion Rhodes (Co. Engineer), Rex Huffman, Mackenzi Klemann (Lima News)."}
  - {date: 2025-08-07, page: 54, event: "Public comment: Heather Davis (American Twp resident) -- community feels excluded; Leis describes roundabout phasing (Beery/Cole first, equipment via US-30)."}
  - {date: 2025-10-23, page: 62, event: "Authorized Neighbors Real Estate Sale & Purchase Contract; on closing PAAC assigns to Bistrozzi."}
  - {date: 2026-02-13, page: 69, event: "Neighbors environmental studies complete; Assignment & Assumption to Bistrozzi LLC; closing 2026-02-13. N. Cole roundabouts design-build: 3 RFQs (1/30), 2 responsive, RFP due 2/27 (SR65/Cole + Cole/Bluelick)."}
  - {date: 2026-02-26, page: 72, event: "BOSC design-build teams Eagle Bridge + Vernon Nagel; subcommittee to score (executive session). Board notes 'public-record requirements' re scoring."}
  - {date: 2026-03-06, page: 74, event: "(Special) Cole St corridor residents (Heather Davis, David Streeter, Mike Lugibihl/Swiss Country Market) object: transparency, no public traffic studies, Bluelick/Cole roundabout could eliminate Swiss Country Market farm stand. Eagle Bridge ranked top; authorized to negotiate."}
  - {date: 2026-03-30, page: 76, event: "Leis ties N. Cole improvements to 'the Google data center project'; 'Google's first public update on area well concerns'; public well-issue contact email. ROW (West Erie Realty $108,100), Kimley-Horn 60% plan review ($25K), Bockrath oversight ($294,988.50). BOSC Star acct holds $1.17M, $68,686 interest."}
  - {date: 2026-04-23, page: 78, event: "(Special) Eagle Bridge construction award ~$3.52M; DGL criteria engineer $31,360; 'All project expenses funded through Google's contribution'; 'the $11 million Project BOSC fund for roadway improvements.' Media: Craig Kelly (Lima News), Todd Cummins (WLIO)."}

transparency_record:        # documents the opacity the records campaign targets
  - "2024-04-18 (p.13): rezoning petition would disclose the USE but NOT the company name."
  - "2024-04-02 / Perry (p.13): Tangeman disclosed client is a 'data center' but not the company."
  - "2025-07-02 (p.50): residents asked when the public would learn storage-vs-cloud + for transparency; chair deflected ('as the company reaches a certain point...')."
  - "2025-08-07 (p.54): resident says community 'feels excluded from the development process.'"
  - "2026-03-06 (p.74): corridor residents cite lack of publicly shared traffic studies; 3-minute limit, 'not intended as a Q&A.'"
  - "2026-03-30 (p.76): Google's FIRST public update on area well concerns -- ~3 years after the project started; well-issue email set up."
  - "2026-03-30 (p.78): PAAC entered executive session citing ORC 4582.58(B) (the econ-dev trade-secret shield) -- active use of the shield to keep deliberations non-public."

well_concerns:
  finding: >-
    2026-03-30 (p.76): the Google data center prompted "area well concerns" -- Google issued its
    first public update and PAAC/Google set up a public contact email for residents to report well
    issues. 2025-05-01 (p.43): a City of Lima / Allen County Water District water-service agreement
    and a City of Lima / AC Sanitary sanitary-service agreement were underway for BOSC.
  significance: >-
    Primary-source link between the data center and residential groundwater impacts -- feeds the
    hydrology / water-balance thread (cooling withdrawal, low-flow, well drawdown). Residents on
    private wells near a high-consumption cooling load is exactly the assimilative-capacity concern.

