  note: >-
    The PAAC board minutes (2023-05 to 2026-04) -- the codename decoder for the whole corpus.
    Confirms BOSC=Bistrozzi=Google and Nadella=Microsoft (terminated), documents the land assembly
    and its assignment to Bistrozzi, discloses the proposed $200K->$250K/yr Elida school PILOT,
    surfaces the Eagle Bridge ~$3.52M actual roundabout award vs the $14.5M budget, records the
