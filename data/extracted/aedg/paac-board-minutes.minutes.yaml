kind: paac_minutes
subject: Port Authority of Allen County (PAAC) Board of Directors minutes — May 2023 to April 2026

provenance:
  source_path: data/documents/aedg/PRR-01-bundle.ocr.pdf
  bundle: "Allen County -- Responsive Records -- Parent PRR.pdf (producing body: PAAC)"
  pages: "index pp.1-79 (= bundle 0-based 0-78), Part 1 of the bundle"
  layer: native_text   # typed minutes; text layer is reliable here (unlike the scanned exhibits)
  content_verified: '2026-06-07'   # read from the native PDF text layer
  evidence: native typed minutes (PAAC public-records production)
  note: >-
    Chronological PAAC board minutes. Figures/dates transcribed from the typed layer; meeting
    locations are the AEDG Conference Room throughout (the Authority operates out of AEDG -- it has
    no employees, see paac-records-policy.policy.yaml). Names carry OCR/typo variants (e.g.
    "Vesttrozzi LLC" p.69 = Bistrozzi LLC; "Bistrozzi Inc" p.62 = Bistrozzi LLC; "Williamowski" =
    Willamowski; "Microsoft"/"Nadella" per below).

headline_findings:
  bosc_is_google:
    finding: >-
      Project BOSC = Bistrozzi LLC = a GOOGLE data center. Confirmed in the PAAC's own minutes:
      (1) 2026-03-30 (p.76): "Cindy Leis reported on N. Cole Street roadway improvements tied to the
      Google data center project and shared Google's first public update on area well concerns";
      (2) 2026-04-23 (p.78): "All project expenses are funded through Google's contribution" and
      "reimbursed from the Google project fund" and "the $11 million Project BOSC fund for roadway
      improvements." Bistrozzi is the land-holding/contracting entity; Google is the end user.
    significance: >-
      Independent primary-source confirmation (from the Authority that signed the $14.5M roadwork
      deal) that BOSC/Bistrozzi = Google -- corroborating the County's own "Bistrozzi/Google Data
      center facility" phrasing in bosc-prr-production-2026-06-05.response-index.yaml (item 2/19).
      Google only went public on the well concerns ~2026-03, ~3 years after the project began (2023-05).
  nadella_is_microsoft:
    finding: >-
      Project Nadella = a MICROSOFT data center at Perry Industrial Park (Perry Township). Microsoft
      reps attended the Perry Township zoning meetings (2024-08-27/28) and a community event at Perry
      School (2024-09-12) [p.28]. The County amended Perry Township zoning to ADD "data center" as a
      permitted use to enable it [pp.13-14, 22, 26]. The Microsoft agreement was TERMINATED 2024-10-24
      ("Motion to terminate the agreement with Microsoft after Rex reviews") [p.29].
    significance: >-
      A SECOND, earlier data-center play (codename Nadella = Microsoft CEO Satya Nadella). Shows the
      Allen County / AEDG / PAAC data-center playbook -- quiet rezoning-to-add-data-centers, codenamed
      prospects -- predates BOSC's public phase. Microsoft walked; Google (BOSC) proceeded.
  school_pilot_amount_disclosed:
    finding: >-
      The Elida school compensation amount -- withheld as "non-public" in the CRA / school-notice
      docs (cra-agreement.cra.yaml, school-district-notice-*.yaml) -- appears as a PROPOSED figure in
      these minutes: an "additional compensation agreement in the amount of $200,000 per year"
      (2025-02-27, p.35), restated as a "School District PILOT ... annual payment in the amount of
      $250,000/year to the Elida School District" (2025-03-27 p.38; 2025-05-01 p.43).
    significance: >-
      Concrete dollar figures ($200K -> $250K/yr to Elida) for the school compensation the executed
      agreement keeps secret. PROPOSED amounts in PAAC minutes, not the final executed terms -- but a
      direct lead for the public-ledger thread (src/bosc/ledger.py) and the withholding narrative.
  eagle_bridge_award_vs_budget:
    finding: >-
      The actual North Cole Street roundabout design-build award to Eagle Bridge is ~$3.52M
      (2026-04-23, p.78), against the $14.5M Company Contribution / Tetra Tech OPC budget. Plan
      review (Kimley-Horn $25K), construction oversight (Bockrath $294,988.50), ROW acquisition
      (West Erie Realty $108,100), criteria engineer (DGL $31,360) are additional. By 2026-03-30 the
      "BOSC project Star account ... holds $1.17 million and has earned $68,686 in interest" (p.76);
      the 2026-04-23 minutes call it "the $11 million Project BOSC fund."
    significance: >-
      The $14.5M contribution materially exceeds early actual awards -- supporting the RDA §5.5
      overpayment-refund analysis (roadwork-development-agreement.rda.yaml): real cost may land well
      below the contribution, with the difference (plus any 629/ODOD grants) refundable to Google.
      The $14.5M vs "$11M fund" vs "$1.17M in the Star account" figures should be reconciled against
      the actual fund ledger [FOLLOWUP -- do not reconcile by inference].

