relevance:
  tags: [verified, aedg, port-authority, public-records, records-withholding, records-retention, leis, conflict-of-interest]
  note: >-
    The PAAC records policy (adopted 2022-07-28) embeds the R.C. 4582.58 economic-development
    trade-secret shield (developer info routed via AEDG is non-record until the employer commits in
    writing), a discretionary "transitory" correspondence-deletion standard, a 2-year retention for
    PRR requests, and a legal-hold provision. It also establishes that PAAC has no employees and that
    Cynthia Leis directs BOTH AEDG and the Port Authority -- the single locus of control over both the
    front-end shield and the back-end records custody for the Bistrozzi deal.
