  "203E10000": "Excavation, as per plan (CY)"
  "203E20001": "Embankment, as per plan (CY)"
  "204E10001": "Subgrade compaction, as per plan (SY)"
  "623E38500": "Monument assembly, Type C (EACH)"
  "653E10001": "Topsoil furnished and placed, as per plan (CY)"
  "decorative_walk": "Decorative plain concrete walk, 6\" thick (splitter island), as per plan (SF)"
  "605E11111": "6\" shallow pipe underdrains with geotextile fabric, as per plan (FT)"
