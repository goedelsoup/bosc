# RECONCILIATION NOTES
reconciliation:
  diller_ocr_correction: "OCR earlier rendered Diller total as $4,535,217.80; the correct figure is $1,535,217.80 (leading digit is a 1, not a 4). Construction total of $14,223,081 only reconciles with the $1.535M figure."
  agreement_vs_opc_bluelick: "Roadwork agreement narrative states $2.5M 'specifically budgeted' for the Bluelick & N. Cole roundabout. The OPC lists that roundabout at $1,704,502. The $2.5M likely bundles the Bluelick roundabout + Bluelick corridor work + contingency/ROW, or reflects a budgeting allowance distinct from the engineer's estimate. Flag for the County Engineer."
  state_route_label: "Agreement and design-build minutes variously reference SR 115 and SR 65 for the Cole Street west roundabout. OPC labels it 'Cole Street / West Street (SR 115).' Confirm correct route designation."
  quantities_caveat: "Line-item quantities transcribed from a degraded scan are approximate. Dollar totals/subtotals are high-confidence."