# Tetra Tech "Opinion of Probable Project Cost" — Project BOSC Roadwork
# Source: PAAC PRR production, scanned exhibit pages 318-328 (searchable PDF).
# Read by high-resolution visual inspection (300 DPI) to correct OCR errors.
# All estimates: BASIS = CONCEPTUAL; Estimator RJS; Checked AMD; Date 7/11/2025 (sheet footer 7/17/2025).
# File: "Conceptual OPC_Cole St.xlsx"
#
# NOTE ON CONFIDENCE: Dollar figures in the cost-summary table and the
# section/construction subtotals and totals were read directly and are
# high-confidence. Individual line-item QUANTITIES (and a few cent-level
# digits) are from a degraded scan; treat quantities as approximate and
# verify against Tetra Tech's native spreadsheet if precision is needed.

meta:
  program: "Project BOSC Roadwork (privately funded; BOSC Team deposit to PAAC; dedicated to County on completion)"
  estimator: "Tetra Tech (RJS), checked AMD"
  basis: "Conceptual"
  date: "2025-07-11"
  source_file: "Conceptual OPC_Cole St.xlsx"
  pdf_pages: "318 (summary), 319-328 (detail)"
  contingency_and_inflation_pct: 25
  summary_construction_total: 14223081   # sum of the six line-item costs on the summary sheet
  # The six summary line costs below are AFTER each sub-estimate's 25% contingency
  # (i.e., they equal each sub-estimate's TOTAL), except where noted.

# Standard section schema shared by all intersection (roundabout) estimates.
# Each sub-estimate breaks into these sections; section subtotals roll up to a
# Construction Subtotal, then +25% contingency = Total.
section_schema:
  - ROADWAY            # clearing/grubbing, excavation, embankment, subgrade, monument, topsoil, decorative walk
  - EROSION_CONTROL
  - DRAINAGE           # 6" shallow pipe underdrains w/ geotextile; drainage improvements (LS)
  - PAVEMENT           # asphalt base/surface/intermediate, aggregate base, tack coat, curb & gutter, decorative reinforced concrete (truck apron)
  - WATER_WORK
  - LIGHTING
  - TRAFFIC_CONTROL
  - LANDSCAPING
  - RIGHT_OF_WAY       # agricultural land (AC) + residential land (AC)
  - INCIDENTALS        # maintaining traffic, construction layout/surveying, mobilization (each LS)
  - DESIGN_SURVEY_INSPECTION  # design <15%>, survey, construction admin & inspection

# ODOT item-number reference (from the canonical Diller sheet; identical across sheets)
item_reference:
