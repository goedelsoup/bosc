records_withholding_clause:        # §9.13 Confidential Information — a THIRD developer-notice mechanism
  section: '9.13'
  public_record_acknowledged: "The Company acknowledges the Agreement is a public record subject to disclosure under Ohio public records law."
  authority_obligations: >-
    The Authority agrees to (a) give the Company written notice AT LEAST FIVE (5) BUSINESS DAYS prior
    to responding to ALL records requests related to the Company or Project; (b) reasonably cooperate
    with the Company in responding; (c) disclose only records required to be disclosed under Ohio
    public records law; and (d) redact, omit, or refuse to provide records not required to be disclosed.
  exemptions_cited: "R.C. 122.36, 122.75, 149.433, 149.45, 718.13, 1333.61 et seq., 5703.21, 5711.101"
  savings_clause: "'Nothing in this Agreement shall be interpreted as contrary to the Ohio Public Records Act (R.C. 149.43).'"
  significance: >-
    The THIRD contractual records-withholding mechanism in this deal, after the NDA §6 (>=10 business
    days' developer notice; mutual-nda-bistrozzi.nda.yaml) and the CRA §22 public-records indemnity
    (cra-agreement.cra.yaml). Here the Authority (a separate public body from the Commissioners) binds
    itself to a >=5-business-day developer-notice-and-cooperate-on-redaction routine before answering
    ANY request touching the Company/Project. Same engine, second custodian — corroborates the
    systemic delay/withholding thesis in bosc-prr-production-2026-06-05.response-index.yaml.

notable_clauses:
  no_procurement: >-
    §9.17 — "The performance of any obligations under this Agreement does not require the Company to
    submit any bid or otherwise participate in any procurement process of the Authority." (The Company
    pays $14.5M and is exempted from competitive procurement; the Authority selects the road contractors
    via design-build bidding under §3.1(c).)
  assignment: "§9.3 — the Company may assign to any Affiliate / merger successor / asset purchaser / public-offering successor / financing party (incl. R.C. Ch. 4582) WITHOUT Authority approval; the Authority may not assign without the Company's consent."
  no_third_party_beneficiaries: "§9.20 — only the Authority and Company are parties; no third-party (e.g., affected residents) may enforce."
  jury_waiver: "§9.15 — both parties waive jury trial for any claim arising under or connected to the Agreement."
  anti_corruption: "§9.16 — anti-bribery / 'Anything of Value' covenant binding the Authority and its agents."
  no_cross_default: "§8.3 — default under any other Project agreement is not automatically a default here."

