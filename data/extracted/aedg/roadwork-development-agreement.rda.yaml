relevance:
  tags: [verified, aedg, roadwork, port-authority, public-subsidy, records-withholding, land-assembly, public-ledger]
  note: >-
    The public-cost counterpart to the CRA. PAAC + County will build 4 roundabouts + 2 road rehabs
    (~$14.5M, basis = the Tetra Tech OPC) to serve the Bistrozzi data-center campus, funded by a
    $14.5M Company Contribution that public Roadwork Development (629) + ODOD Jobs & Commerce grants
    may refund (§5.5), then dedicate the roads to the County for perpetual maintenance. Surfaces a
    third records-withholding clause (§9.13), a no-competitive-procurement carve-out (§9.17), two new
    resolutions (PAAC O.729-25; County 588-25), and new actors (Audet, Niemeyer, Huffman, Tangeman,
    Rhodes). Effective 2025-09-15.
