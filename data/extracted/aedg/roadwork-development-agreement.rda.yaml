project_recital:                   # WITNESSETH / recitals (Article I incorporates them as material terms, §9.1)
  property: "real property in American Township, Allen County (Exhibit A)"
  project: >-
    develop, construct (in one or more phases) and operate "one or more data center(s)" plus
    administrative/accessory/support buildings, utility buildings, and related site improvements.
  roadwork_purpose: "public-road improvements near the Property to support construction/operation of the data center(s)."
  grant_funding_anticipated: >-
    State of Ohio Roadwork Development (629) Grant and Ohio Dept. of Development Jobs & Commerce Grant
    (collectively "Roadwork Development Grants"), with the Authority as eligible grantee.

financial_terms:
  company_contribution_usd: 14500000      # §3.2(a) — one-time payment due within 30 business days of Effective Date
  contribution_basis: >-
    "inclusive of all project costs including any admin and legal fees" (§3.2a). The roadwork is at
    no cost to the Company beyond this Contribution.
  cost_basis_document: >-
    Exhibit D: the Parties relied on "the attached itemized cost estimate from Tetra Tech which the
    Parties received on or about July 17, 2025." That estimate is the OPC at bundle pp.317-328
    (extracted as data/extracted/aedg/roundabouts.summary.opc.yaml: construction total $14,223,081).
    The $14.5M Contribution ~= the OPC construction total + ~$277K headroom for admin/legal.
  exhibit_d_typo: >-
    Exhibit D states the Tetra Tech estimate as "$14,500.00" — a source typo for $14,500,000.00
    (it equals the Company's Contribution and reconciles with the OPC's ~$14.22M construction total).
    [verbatim transcription; flagged, not corrected in source]
  grant_refund_mechanism:          # §5.5 Overpayment Amount
    summary: >-
      After completion, the Authority certifies Total Cost. If Total Cost < (Company's Contribution +
      Roadwork Grant Funds + Additional Grant Funds), the Authority pays the difference (the
      "Overpayment Amount") back to the Company within 60 days; grant funds received after itemization
      are likewise refunded to the Company.
    significance: >-
      Public grant money (the 629 / Jobs & Commerce grants) effectively backfills and can REFUND the
      private Contribution — so the headline "$14.5M private contribution" may be net-reduced by public
      grants flowing to the Company. The true public/private cost split turns on grant awards not in
      this document. [inference — flagged; depends on grant amounts]
  interest: "§5.2 — Authority may hold the Contribution in an interest-bearing account; interest funds Authority operations, not refunded."

