  participant: Allen County Board of Commissioners ("Participant")
  company_counsel: Vorys, Sater, Seymour and Pease LLP -- Scott J. Ziance (sjziance@vorys.com)

execution:
  effective_date_rule: "the date the last party signs (§1)"
  signatures:
    - party: Bistrozzi LLC (Company)
      signatory: Scott J. Ziance
      title: Its Authorized Signatory
      affiliation: Vorys, Sater, Seymour and Pease LLP (Company counsel)
      date: '2025-07-01'           # handwritten on the executed counterpart (p.5)
    - party: Allen County Board of Commissioners (Participant)
      signatory: Brian Winegardner
      title: President, Board of Commissioners
      date: null                   # signature present; no handwritten date on the produced copy
  effective_date_resolved: '2025-07-01'   # last visible signature (Ziance); Winegardner date left blank
