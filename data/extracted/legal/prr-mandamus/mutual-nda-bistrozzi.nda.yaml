terms:
  purpose: >-
    (a) evaluate whether to enter into a CRA Agreement; (b) if the parties enter into a CRA,
    fulfill each party's confidentiality obligations to the extent incorporated therein (§Purpose).
  confidential_information: >-
    Broadly defined (§2) -- tangible/intangible, oral/visual/electronic, incl. trade secrets,
    financial, technical (research, development, procedures, algorithms, data, designs, know-how),
    and business information (operations, planning, marketing, products, negotiations, proposals);
    includes information learned during facility tours/site visits.
  duty: "Recipient protects with no less than a reasonable degree of care; use only for the Purpose (§§3-4)."
  recipient_primary_obligor: "Recipient liable as primary obligor for breaches by its Authorized Personnel, with or without its knowledge (§4)."
  term: "Remains in effect until terminated by either party on 30 days' prior written notice; survives as to info disclosed before termination (§8)."
  duty_duration: "A Recipient's duty to protect expires 3 years from the date of disclosure; on request, return or destroy all Confidential Information -- unless retention is required by State public record laws (§9)."
  no_obligation_to_exchange: "§10 -- imposes no obligation to actually exchange information or proceed with any deal."
  no_ip_transfer: "§11 -- no IP rights conveyed beyond the limited rights to carry out the Purpose."
  equitable_relief: "§12 -- improper disclosure may be irreparable; injunctive relief available."
  assignment: >-
    §13 -- NOT assignable by the Participant (the County) without the Company's prior written
    consent; the Company may assign or transfer in its sole discretion. (asymmetric -- mirrors
    CRA §14's affiliate/financing assignability running to the Company's side)
  governing_law: "Ohio law; exclusive venue = state or federal courts in Allen County, Ohio (§16)."
  notices:                           # §17
    county:
      - "President of the Board: bwinegardner@allencountyohio.com"
      - "Allen County Prosecutor: prosecutor@allencountyohio.com"
    company: "Bistrozzi LLC c/o Vorys, Sater, Seymour and Pease LLP, 52 East Gay Street, Columbus, OH 43215, Attn: Scott J. Ziance (sjziance@vorys.com), with copy to same."

public_records_clause:               # §6 -- the operative mechanism behind the records-withholding thesis
  section: '6'
  carve_out: >-
    The confidentiality obligation does not apply to information §6(f) "required to be disclosed by
    operation of law, court order, public record request or other governmental demand" ("Process").
  county_obligations_when_recipient: >-
    PROVIDED THAT where the Participant (the County) is the Recipient, the County agrees to
    (i) give the Company PRIOR WRITTEN NOTICE of such Process -- "at least 10 business days" --
    sufficient to allow the Company to seek a protective order or other remedy; (ii) disclose only
    such information as is required by law; and (iii) request and seek confidential treatment for
    any Confidential Information so disclosed, to the extent allowed by law.
  litigation_carveout: >-
    Separately, the NDA imposes no obligation on a Recipient as to Confidential Information disclosed
    during litigation between Company and Participant, to the extent relevant to the subject of the
    litigation.
  state_public_record_laws_defined: >-
    "the public record laws generally applicable to public entities in the State of Ohio, including
    any exemptions thereto, and any public record laws applicable to the Allen County Board of
    Commissioners."
  significance: >-
    This is the contractual engine of the records delay. By signing §6 the County bound itself, before
    answering any R.C. 149.43 request touching Bistrozzi material, to (1) tip off the developer at
    least 10 business days in advance, (2) narrow its own production to the bare legal minimum, and
    (3) affirmatively pursue confidential treatment / a protective order on the developer's behalf.
    It converts a neutral records custodian into the developer's notice agent and advocate for
    nondisclosure -- a private incentive to withhold that parallels the CRA §22 public-records
    indemnity (cra-agreement.cra.yaml). The ~7-week production delay (request 2026-04-14 ->
    first batch 2026-06-05) is the predictable output of a built-in 10-business-day developer-notice
    step layered on top of the §9.66(D) review. Note: §6 still requires the County to disclose what
    the law requires; it cannot lawfully convert a public record into a secret -- but it manufactures
    delay and an adversarial posture toward the requester.

