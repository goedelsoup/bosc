  resolution: '417-25'
  date: '2025-05-27'
  body: Allen County Board of County Commissioners (regular session)
  title: >-
    Board of County Commissioners, Allen County, Ohio enters into a Mutual
    Non-Disclosure Agreement with Bistrozzi, LLC.
  members_present: [Beth Seibert, Cory Noonan, Brian Winegardner]
  moved_by: Seibert
  seconded_by: Winegardner
  vote: {Noonan: 'yes', Winegardner: 'yes', Seibert: 'yes'}
  signing_authority: Brian Winegardner (Board President) authorized to sign on behalf of the Board
  clerk: Brittany N. Woods
  requested_by: >-
    Assistant Prosecutor John Willamowski Jr. — per the recitals, "correspondence has been
    received from Assistant Prosecutor John Willamowski Jr., requesting the Board enter into a
