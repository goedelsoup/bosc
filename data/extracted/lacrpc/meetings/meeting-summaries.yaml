  summary: At the January 15, 2026 Community Development Committee meeting of the
    Lima-Allen County Regional Planning Commission, staff noted during the Year in
    Review that "a data center is coming" and that expanded transit service may help
    address transportation needs for the anticipated increase in employment. The Allen
    Economic Development Group update also referenced development activity including
    a "Cole Street data center" among several ongoing projects in Allen County. No
    formal action related to the data center was taken at this meeting.
  corridor_relevance: 'The meeting connects to the corridor project through two passing
    references: a statement that "a data center is coming" and may drive transit demand,
    and a listing of "Cole Street data center" as a recent area development in the
    AEDG update.'
