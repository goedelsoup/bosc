  summary: The Developmental Controls Committee (DCC) held a presentation-only session
    on April 21, 2026, focused on an open discussion about data centers, specifically
    Project BOSC (identified in the text as a Google data center). Committee members
    raised numerous questions and discussed pros and cons, with LACRPC positioning
    itself as a resource for further information. Key figures shared included an initial
    $250,000 payment to Elida Schools, an estimated 30–50 jobs in the first phase,
    and a projected $1.5 billion total investment across all three phases.
  corridor_relevance: The DCC's April 21, 2026 presentation explicitly discussed "project
    BOSC (Google data center)," covering job creation, phased investment totals, and
    a payment to Elida Schools, directly connecting this meeting to the hyperscale
    data center corridor project.
  decisions:
  - 'Motion 27 (04-23-2026) EC: Mr. Baxter made the motion to accept the Community
    Development Committee Report. Seconded by Mr. Cox, the motion carried.'
  - 'Motion 28 (04-23-2026) EC: Mr. Baxter made the motion to accept the Developmental
    Controls Committee Report. Seconded by Ms. Seibert, the motion carried.'
