  summary: The Executive Committee of the Lima-Allen County Regional Planning Commission
    held its regular session on March 26, 2026, covering routine financial, administrative,
    and bylaws business. During the Director's Report, a brief discussion took place
    regarding "the data center," with mention that a meeting presented by Regional
    Growth Partnership at the Ohio Job and Family Services Center was scheduled for
    March 30th and was expected to feature a positive presentation regarding data
    centers. No formal action was taken specifically on the data center matter.
  corridor_relevance: The meeting references "the data center" during the Director's
    Report and notes an upcoming March 30th informational meeting presented by Regional
    Growth Partnership at the Ohio Job and Family Services Center to discuss the data
    center.
  decisions:
  - 'Motion 17 (03-26-2026) EC: Agenda approved as submitted (Schierloh/Post).'
  - 'Motion 18 (03-26-2026) EC: EC minutes of February 26, 2026 approved (Post/Cox).'
  - 'Motion 19 (03-26-2026) EC: Budget revenue, budget expense reports, and payment
    of bills, payroll, and OPERS approved as presented (Post/Kingsley).'
  - 'Motion 20 (03-26-2026) EC: DCC Committee Report accepted, including acceptance
    of street vacation request by Elite Builders within Zurmehly Subdivision in Shawnee
    Township (Post/Gilden).'
  - 'Motion 21 (03-26-2026) EC: Director''s Report accepted (Post/Cox).'
  - 'Motion (03-26-2026) EC: Decided not to consider a virtual meeting policy (Schierloh/Cox).'
  - 'Bylaws Committee recommendations accepted for discussion: DCC meeting frequency
    changed to 1st and 3rd Tuesdays; EC, TCC, and TAC meeting frequency changed from
    monthly to at least quarterly; AAC to be removed with functions transferred to
    EC; TCC renamed MPOPC; CAC and CDC combined into CDAC; TAC renamed Technical Advisory
    Committee.'
  - April 13, 2026 set as last date for comments, concerns, and other nominations
    on committee slate.
  - 'Motion 23 (03-26-2026) EC: Motion to adjourn carried (Post/Cox).'
