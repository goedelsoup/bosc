  tags: [verified, zoning, american-township, m-2, hyperscale-data-center, conditional-use, bza, land-use]
  note: >-
    American Township M-2 General Manufacturing is the data center's zoning home. The CURRENT
    resolution (amended/adopted through 2026-02-09) defines "Data Center" and "Hyperscale Data Center"
    and makes "hyper-data centers" a CONDITIONAL use in M-2 (11.2.4) requiring a BZA conditional-use
    certificate after a public hearing; M-1 caps data centers at 10,000 SF and bars hyperscale (10.2.2).
    M-2 structures are height-capped at 50 ft. The amendment timeline brackets the deal [inference].
    A BZA conditional-use proceeding for the site should exist as public record — a completeness hook.
