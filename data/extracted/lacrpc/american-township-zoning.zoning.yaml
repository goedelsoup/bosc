thesis: >-
  The BOSC/Google data-center site (≈950 W. Bluelick Rd area, American Township — see
  seller-land-packets.land.yaml) sits in American Township's unincorporated jurisdiction, which zones
  the heaviest industrial land as M-2 General Manufacturing. The CURRENT American Township Zoning
  Resolution (last amended/adopted 2026-02-09) (a) carries free-standing DEFINITIONS of both "Data
  Center" and "Hyperscale Data Center," and (b) lists "hyper-data centers" / "electronic data storage
  facilities" as a CONDITIONAL use in the M-2 district -- requiring a Board of Zoning Appeals
  conditional-use certificate after a PUBLIC HEARING, not a permitted-by-right use. The amendment
  cycle that produced this text (cover lists 2025-09-08 and 2026-02-09 adoptions) brackets the deal
  timeline (RDA effective 2025-09-15; land assignment to Bistrozzi 2025-07). [the resolution text is
  document; the "amended FOR this project" causation is inference -- the PDF has no per-amendment log.]

