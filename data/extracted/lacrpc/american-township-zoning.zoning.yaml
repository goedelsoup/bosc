bosc_relevance: >-
  Establishes the local land-use mechanism for the data center: a HYPERSCALE data center is a
  conditional use in M-2 General Manufacturing, gated on a Board of Zoning Appeals conditional-use
  certificate after a public hearing -- a discrete public-records event (application, staff report,
  hearing notice, BZA decision) that should exist for the BOSC site. The records-completeness
  question: did the County/Township produce the M-2 rezoning and/or BZA conditional-use-certificate
  records for the site, and do they name the end user? The 50-ft M-2 height cap and the 90-ft
  State/County-road setback are also concrete constraints to check against the site plan.

