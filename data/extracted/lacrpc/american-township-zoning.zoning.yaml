definitions:                          # source: document, transcribed verbatim (printed pp.21, 25)
  data_center: >-
    "Data Center: A physical location that stores computing machines and their related hardware
    equipment. Contains the computing infrastructure that IT systems require, such as servers, data
    storage drives, and network equipment. It is the physical facility that stores any company's
    digital data."
  hyperscale_data_center: >-
    "Hyperscale Data Center: A massive data center that provides extreme scalability capabilities and
    engineered for large scale workloads within an optimized network infrastructure, streamlined
    network connectivity and minimized latency."

district_m2_general_manufacturing:    # Article 11 (printed pp.64-66)
  purpose: >-
    "The purpose of the M-2 General Manufacturing District is to encourage the development of
    manufacturing facilities of a moderate and heavy nature." (11.0)
  permitted_uses_11_1:                # by-right
    - "Any permitted use established within the M-1 District (excludes B-1 & B-2 uses)"
    - "Grain elevators, concrete plants and the manufacture, storage and sale of related products"
    - "Metal fabrication and casting plants"
    - "Utility Grid Solar Energy Systems (less than 50 megawatts)"
    - "Manufacturing/assembly/distribution of new automobiles, trucks, boats, household goods, farm + construction equipment, plastic & metal products"
    - "Carpentry, woodworking and machine shops; large-scale home/house furnishings production over 50,000 SF"
    - "Accessory buildings/uses incidental to a principal permitted use (principal building required first)"
  conditional_uses_11_2:              # BZA conditional-use certificate AFTER A PUBLIC HEARING
    requires: "Approval of the Township Board of Zoning Appeals after a public hearing"
    the_data_center_entry_11_2_4: >-
      "Any industrial, manufacturing, storage uses (to include but not limited to electronic data
      storage facilities, hyper-data centers, data mining facilities, lithium battery manufacturing
      facilities or plants, or computer chip manufacturing & distribution establishment(s) and those
      not specifically mentioned above but deemed as acceptable use of the land by the Board of Zoning
      Appeals)." (11.2.4)
    other_conditional: ["meat/poultry/game processing (11.2.1)", "chemical plants not emitting corrosive/toxic fumes beyond premises (11.2.2)", "barrow pits (11.2.3)", "one medical/adult-use cannabis retail dispensary (11.2.5)"]
  prohibited_uses_11_3:
    catchall: "Uses not specifically authorized by the express terms of this Article shall be prohibited"
    enumerated: ["junk yards / dumping / salvage / landfill / waste-disposal sites", "habitated RVs/campers", "outdoor junk/inoperable-vehicle accumulation", "trash/debris accumulation (nuisance per se)", "uses dangerous/injurious/noxious to surrounding areas", "amusement arcades / adult-entertainment", "ORC Ch. 3796 marijuana cultivators/processors"]

dimensional_standards_official_schedule_15_1:   # printed pp.78-79
  with_central_water_public_sewer:    # the configuration a data center on the County sanitary loop would use
    min_lot_size_sqft: 20000
    frontage_width_ft: 100
    max_structure_height_ft: 50       # <-- a hyperscale data center is height-capped at 50 ft in M-2
    rear_setback_ft: 30               # footnotes (D,G)
  with_private_well_septic:
    min_lot_size_sqft: 108900         # 2.5 acres
    max_structure_height_ft: 50
  road_setback_11_8: >-
    No portion of a building closer than fifty-five (55) feet to the section line / center of nearest
    road pavement, EXCEPT State and County Roads which require ninety (90) feet. Plus an ODOT
    new-/changed-highway provision: within 300 ft of a proposed highway centerline (or 500 ft of an
    intersection), the Zoning Inspector must notify the ODOT Director and withhold the permit for up to
    120 days. (11.8; cross Section 21.4)
  screening_11_9: >-
    For non-residential uses abutting an R-District: a 6-ft solid wall/fence, OR a 15-ft-wide strip
    planted with an evergreen hedge/shrubs ≥4 ft at planting. (11.9)

m1_contrast:                          # why the district matters — M-1 caps data centers, M-2 does not
  m1_conditional_10_2_2: >-
    In the M-1 (Light Manufacturing) district, data centers are a conditional use but EXPLICITLY
    capped: "Electronic Data Storage Centers, Data Mining Facilities, Electronic Media Storage Device
    Centers (Data center not to exceed 10,000 square feet); excluding 'hyperscale data centers'."
    (10.2.2) -- i.e. a hyperscale data center is impermissible in M-1 and only reachable in M-2.

