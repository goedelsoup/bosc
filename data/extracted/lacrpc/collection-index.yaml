kind: collection_index
subject: LACRPC Comprehensive Planning / Land Use / Zoning corpus — relevance-tiered catalog of all 36 documents

provenance:
  source_manifest: data/documents/lacrpc/MANIFEST.yaml   # authoritative per-document provenance (URL, sha256, bytes, content_verified_date)
  source_page: https://www.lacrpc.com/182/Comprehensive-Planning-Land-Use-Zoning
  retrieved: '2026-06-06'
  content_verified: '2026-06-07'
  evidence: LACRPC (Lima-Allen County Regional Planning Commission), CivicPlus DocumentCenter

purpose: >-
  The LACRPC corpus is 36 documents: every Allen County township/village comprehensive plan and zoning
  resolution plus the county-wide land-use regulations. Most are GENERAL planning reference for
  jurisdictions other than the data-center site. This index tiers them by BOSC relevance so the
  load-bearing few (American Township; the receiving-WWTP townships; the county-wide regs that bind the
  site) are separated from the bulk reference set. Dates/sizes are transcribed from MANIFEST.yaml
  (content_verified from each document's own text layer; null = image-only scan or no date on cover).

tier_1_site_and_use:                 # the data center's own jurisdiction
  - file: February 2026 American Township Zoning Resolution_202603191409369887.pdf
    manifest_id: 184
    jurisdiction: American Township
    type: zoning_resolution
    content_verified_date: '2026-02-09'
    relevance: >-
      THE site's zoning. M-2 General Manufacturing defines + conditionally permits hyperscale data
      centers (BZA conditional-use after public hearing). Deep-extracted → american-township-zoning.zoning.yaml.
  - file: American Township Comprehensive Plan (PDF).pdf
    manifest_id: 167
    jurisdiction: American Township
    type: comprehensive_plan
    content_verified_date: '2009-01'
    relevance: >-
      The site's long-range land-use plan (predates project ~16 yr). Future-land-use is map-image only;
      site-specific designation NOT text-extractable — open question (plan-consistency of the M-2 use).

tier_2_binding_county_regs_and_receiving_townships:
  - file: Subdivision_Regs2013.pdf
    manifest_id: 353
    jurisdiction: Allen County (county-wide)
    type: regulation
    content_verified_date: '2013-05-01'
    relevance: "Binds the site's land division/plat (the land assembly split/combined parcels); referenced by the zoning resolution's PUD/access provisions."
  - file: SWMSC-Regs-Final-12.1.16.pdf
    manifest_id: 346
    jurisdiction: Allen County (county-wide)
    type: regulation
    content_verified_date: '2016-12-01'
    relevance: "Stormwater Management & Sediment Control Regs — binds site stormwater/runoff; hydrology-axis nexus (Ottawa watershed, edge-of-field)."
  - file: 2023-final-IDREGS-with-dates.pdf
    manifest_id: 347
    jurisdiction: Allen County (county-wide)
    type: regulation
    content_verified_date: '2023-04-21'
    relevance: "Illicit Discharge regulations (MS4/NPDES stormwater nexus) — the clean-water-connection prohibition echoed on the Indianbrook as-built."
  - file: Allen County Access Management Plan December 2024 (PDF).pdf
    manifest_id: 157
    jurisdiction: Allen County (county-wide)
    type: management_plan
    content_verified_date: '2024-12-17'
    relevance: "Access/driveway standards for the corridor — ties to the Roadwork Development Agreement (roundabouts, Beery/Bluelick access)."
  - file: Land Division Process Brochures (2023) (PDF).pdf
    manifest_id: 153
    jurisdiction: Allen County
    type: brochure
    content_verified_date: null
    relevance: "Procedural overview of lot splits/combinations — context for the land-assembly mechanics."
  - file: Shawnee Twp Zoning (PDF).pdf
    manifest_id: 190
    jurisdiction: Shawnee Township
    type: zoning_resolution
    content_verified_date: '2021-08-12'
    relevance: "Township hosting Shawnee No.2 WWTP (2PK00002), a BOSC-1A receiving plant — secondary land-use context, not the site."
  - file: Shawnee Township Comprehensive Plan (PDF).pdf
    manifest_id: 162
    jurisdiction: Shawnee Township
    type: comprehensive_plan
    content_verified_date: '2009-10'
    relevance: "Long-range plan for the Shawnee No.2 receiving-plant township."
  - file: Bath Twp Zoning (PDF).pdf
    manifest_id: 194
    jurisdiction: Bath Township
    type: zoning_resolution
    content_verified_date: '2023-05-05'
    relevance: "Township hosting American Bath (2PH00007); also the Bluelick Rd Underpass project area (RDA/road context)."
  - file: Bath Township Comprehensive Plan (PDF).pdf
    manifest_id: 170
    jurisdiction: Bath Township
    type: comprehensive_plan
    content_verified_date: '2017-05'
    relevance: "Long-range plan for the American Bath receiving-plant township."

