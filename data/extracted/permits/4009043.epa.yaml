  note: 'Letter from EMH&T to Mr. Joe Loucek (Application Coordinator, 401/Wetlands/Mitigation
    Section, Ohio EPA) providing additional information in response to a "Complete"
    notification received January 21, 2026 for the Project BOSC Level 2 Isolated Wetland
    Permit application. The additional information addresses practicable on-site alternatives,
    specifically: (1) why existing 138 kV corridors cannot be upgraded to 345 kV,
    and (2) why the preferred transmission route cannot be shifted to minimize impacts
    to the category 2 forested wetland in Area 3. Construction of the data center
    facility is currently underway with footers already poured.'
